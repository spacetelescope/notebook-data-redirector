AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  notebook-data-redirector

  SAM template for notebook data redirector

Parameters:
  SecretArn:
    Type: String
    Description: ARN of the Secrets Manager secret containing Box JWT credentials
  BoxFolderId:
    Type: String
    Description: ID of the root Box folder
  LambdaRoleARN:
    Type: String
    Description: ARN of the role to use for the lambda functions
  SecretRoleARN:
    Type: String
    Description: ARN of the role to assume to retrieve the secret
  ServiceAccountUserId:
    Type: String
    Description: Box service account user ID

Globals:
  Function:
    Runtime: python3.12
    Handler: index.handler
    CodeUri: notebook_data_redirector/
    Environment:
      Variables:
        SECRET_ARN: !Ref SecretArn
        BOX_FOLDER_ID: !Ref BoxFolderId
        SECRET_ROLE_ARN: !Ref SecretRoleARN
  Api:
    EndpointConfiguration: REGIONAL

Resources:
  ManifestTable:
    Type: AWS::Serverless::SimpleTable
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      PrimaryKey:
        Name: filepath
        Type: String
      SSESpecification:
        SSEEnabled: true

  ValidationQueueTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AttributeDefinitions:
        - AttributeName: filepath
          AttributeType: S
      KeySchema:
        - AttributeName: filepath
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      StreamSpecification:
        StreamViewType: NEW_IMAGE

  SyncStateTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AttributeDefinitions:
        - AttributeName: sync_id
          AttributeType: S
      KeySchema:
        - AttributeName: sync_id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  # NOTE: FolderCacheTable is provisioned but not currently used by application code.
  # Folder sharing state is cached in-memory within each Lambda invocation.
  # A future improvement could persist this to DDB to share across invocations.
  FolderCacheTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AttributeDefinitions:
        - AttributeName: folder_id
          AttributeType: S
      KeySchema:
        - AttributeName: folder_id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true

  EventDedupTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AttributeDefinitions:
        - AttributeName: event_id
          AttributeType: S
      KeySchema:
        - AttributeName: event_id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  WebhookQueueTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AttributeDefinitions:
        - AttributeName: work_id
          AttributeType: S
      KeySchema:
        - AttributeName: work_id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      StreamSpecification:
        StreamViewType: NEW_IMAGE

  BoxWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      MemorySize: 128
      # Box retries after 30 seconds, so we should give up at that point, too:
      Timeout: 30
      Handler: webhook_receiver.lambda_handler
      Role: !Ref LambdaRoleARN
      Environment:
        Variables:
          MANIFEST_TABLE_NAME: !Ref ManifestTable
          EVENT_DEDUP_TABLE_NAME: !Ref EventDedupTable
          WEBHOOK_QUEUE_TABLE_NAME: !Ref WebhookQueueTable
          SERVICE_ACCOUNT_USER_ID: !Ref ServiceAccountUserId
      Events:
        BoxWebhookEvent:
          Type: Api
          Properties:
            Path: /webhook_event
            Method: post


  SyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      MemorySize: 1024
      # 15 minutes (Lambda's maximum)
      Timeout: 900
      ReservedConcurrentExecutions: 1
      Handler: sync.lambda_handler
      Role: !Ref LambdaRoleARN
      Environment:
        Variables:
          MANIFEST_TABLE_NAME: !Ref ManifestTable
          SYNC_STATE_TABLE_NAME: !Ref SyncStateTable
          FOLDER_CACHE_TABLE_NAME: !Ref FolderCacheTable
          # VALIDATION_QUEUE_TABLE_NAME intentionally omitted —
          # validation is handled by ValidationWorkerFunction via DDB Streams.
      Events:
        ReconciliationEvent:
          Type: Schedule
          Properties:
            Schedule: cron(0 6 * * ? *)
            Input: '{"mode": "reconciliation"}'
        FullSyncEvent:
          Type: Schedule
          Properties:
            Schedule: cron(0 3 ? * SUN *)
            Input: '{"mode": "full-sync"}'

  WebhookWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      MemorySize: 1024
      # 15 minutes (Lambda's maximum — full budget for folder fan-out)
      Timeout: 900
      Handler: webhook_worker.lambda_handler
      Role: !Ref LambdaRoleARN
      Environment:
        Variables:
          MANIFEST_TABLE_NAME: !Ref ManifestTable
          FOLDER_CACHE_TABLE_NAME: !Ref FolderCacheTable
          WEBHOOK_QUEUE_TABLE_NAME: !Ref WebhookQueueTable
          SERVICE_ACCOUNT_USER_ID: !Ref ServiceAccountUserId
      Events:
        WebhookQueueStream:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt WebhookQueueTable.StreamArn
            StartingPosition: LATEST
            BatchSize: 10
            MaximumRetryAttempts: 3
            BisectBatchOnFunctionError: true
            MaximumRecordAgeInSeconds: 3600

  ValidationWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      MemorySize: 256
      Timeout: 60
      Handler: validation_worker.lambda_handler
      Role: !Ref LambdaRoleARN
      Environment:
        Variables:
          MANIFEST_TABLE_NAME: !Ref ManifestTable
          VALIDATION_QUEUE_TABLE_NAME: !Ref ValidationQueueTable
      Events:
        ValidationQueueStream:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt ValidationQueueTable.StreamArn
            StartingPosition: LATEST
            BatchSize: 10
            MaximumRetryAttempts: 3
            BisectBatchOnFunctionError: true
            MaximumRecordAgeInSeconds: 3600

  RedirectorFunction:
    Type: AWS::Serverless::Function
    Properties:
      MemorySize: 128
      # DynamoDB read + conditional queue write; 30s budget for cold starts.
      Timeout: 30
      Handler: redirector.lambda_handler
      Role: !Ref LambdaRoleARN
      Environment:
        Variables:
          MANIFEST_TABLE_NAME: !Ref ManifestTable
          VALIDATION_QUEUE_TABLE_NAME: !Ref ValidationQueueTable
          ENABLE_ASYNC_VALIDATION: "true"
      Events:
        RedirectorEvent:
          Type: Api
          Properties:
            Path: /redirect/{filepath+}
            Method: get

Outputs:
  BoxWebhookURL:
    Description: "Box webhook URL"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/webhook_event"
  RedirectBaseURL:
    Description: "Redirector base URL"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/redirect"

AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  notebook-data-redirector

  SAM template for notebook data redirector

Parameters:
  SecretArn:
    Type: String
    Description: ARN of the Secrets Manager secret containing Box JWT credentials
  BoxFolderId:
    Type: String
    Description: ID of the root Box folder
  LambdaRoleARN:
    Type: String
    Description: ARN of the role to use for the lambda functions
  SecretRoleARN:
    Type: String
    Description: ARN of the role to assume to retrieve the secret

Globals:
  Function:
    Runtime: python3.12
    Handler: index.handler
    CodeUri: notebook_data_redirector/
    Environment:
      Variables:
        SECRET_ARN: !Ref SecretArn
        BOX_FOLDER_ID: !Ref BoxFolderId
        SECRET_ROLE_ARN: !Ref SecretRoleARN
  Api:
    EndpointConfiguration: REGIONAL

Resources:
  ManifestTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      PrimaryKey:
        Name: filepath
        Type: String

  ValidationQueueTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: filepath
          AttributeType: S
      KeySchema:
        - AttributeName: filepath
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true

  SyncStateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      AttributeDefinitions:
        - AttributeName: sync_id
          AttributeType: S
      KeySchema:
        - AttributeName: sync_id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  BoxWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      MemorySize: 128
      # Box retries after 30 seconds, so we should give up at that point, too:
      Timeout: 30
      Handler: webhook_receiver.lambda_handler
      Role: !Ref LambdaRoleARN
      Environment:
        Variables:
          MANIFEST_TABLE_NAME: !Ref ManifestTable
      Events:
        BoxWebhookEvent:
          Type: Api
          Properties:
            Path: /webhook_event
            Method: post


  SyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      MemorySize: 1024
      # 15 minutes (Lambda's maximum)
      Timeout: 900
      ReservedConcurrentExecutions: 1
      Handler: sync.lambda_handler
      Role: !Ref LambdaRoleARN
      Environment:
        Variables:
          MANIFEST_TABLE_NAME: !Ref ManifestTable
          VALIDATION_QUEUE_TABLE_NAME: !Ref ValidationQueueTable
          SYNC_STATE_TABLE_NAME: !Ref SyncStateTable
      Events:
        DrainQueueEvent:
          Type: Schedule
          Properties:
            Schedule: rate(1 hour)
            Input: '{"mode": "drain-queue"}'
        ReconciliationEvent:
          Type: Schedule
          Properties:
            Schedule: cron(0 6 * * ? *)
            Input: '{"mode": "reconciliation"}'
        FullSyncEvent:
          Type: Schedule
          Properties:
            Schedule: cron(0 3 ? * SUN *)
            Input: '{"mode": "full-sync"}'

  RedirectorFunction:
    Type: AWS::Serverless::Function
    Properties:
      MemorySize: 128
      # DynamoDB read + conditional queue write; 30s budget for cold starts.
      Timeout: 30
      Handler: redirector.lambda_handler
      Role: !Ref LambdaRoleARN
      Environment:
        Variables:
          MANIFEST_TABLE_NAME: !Ref ManifestTable
          VALIDATION_QUEUE_TABLE_NAME: !Ref ValidationQueueTable
          ENABLE_ASYNC_VALIDATION: "true"
      Events:
        RedirectorEvent:
          Type: Api
          Properties:
            Path: /redirect/{filepath+}
            Method: get

Outputs:
  BoxWebhookURL:
    Description: "Box webhook URL"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/webhook_event"
  RedirectBaseURL:
    Description: "Redirector base URL"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/redirect"

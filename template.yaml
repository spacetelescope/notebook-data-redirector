AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  notebook-data-redirector

  SAM template for notebook data redirector

Parameters:
  SecretArn:
    Type: String
    Description: ARN of the Secrets Manager secret containing Box JWT credentials
  BoxFolderId:
    Type: String
    Description: ID of the root Box folder
  LambdaRoleARN:
    Type: String
    Description: ARN of the role to use for the lambda functions
  SecretRoleARN:
    Type: String
    Description: ARN of the role to assume to retrieve the secret
  ValidationQueueTableName:
    Type: String
    Description: Name of the pre-provisioned DynamoDB validation queue table
    Default: notebook-data-validation-queue
  SyncStateTableName:
    Type: String
    Description: Name of the pre-provisioned DynamoDB sync state table
    Default: notebook-data-sync-state
  FolderCacheTableName:
    Type: String
    Description: Name of the pre-provisioned DynamoDB folder cache table
    Default: notebook-data-folder-cache
  EventDedupTableName:
    Type: String
    Description: Name of the pre-provisioned DynamoDB event dedup table
    Default: notebook-data-event-dedup
  WebhookQueueTableName:
    Type: String
    Description: Name of the pre-provisioned DynamoDB webhook queue table
    Default: notebook-data-webhook-queue
  ServiceAccountUserId:
    Type: String
    Description: Box service account user ID

Globals:
  Function:
    Runtime: python3.12
    Handler: index.handler
    CodeUri: notebook_data_redirector/
    Environment:
      Variables:
        SECRET_ARN: !Ref SecretArn
        BOX_FOLDER_ID: !Ref BoxFolderId
        SECRET_ROLE_ARN: !Ref SecretRoleARN
  Api:
    EndpointConfiguration: REGIONAL

Resources:
  ManifestTable:
    Type: AWS::Serverless::SimpleTable
    DeletionPolicy: Retain
    Properties:
      PrimaryKey:
        Name: filepath
        Type: String

  # ValidationQueueTable, SyncStateTable, FolderCacheTable, EventDedupTable, and
  # WebhookQueueTable are pre-provisioned DynamoDB tables (created via AWS CLI/SSO).
  # Table names are referenced in the function environment variables below.

  BoxWebhookFunction:
    Type: AWS::Serverless::Function
    Properties:
      MemorySize: 128
      # Box retries after 30 seconds, so we should give up at that point, too:
      Timeout: 30
      Handler: webhook_receiver.lambda_handler
      Role: !Ref LambdaRoleARN
      Environment:
        Variables:
          MANIFEST_TABLE_NAME: !Ref ManifestTable
          EVENT_DEDUP_TABLE_NAME: !Ref EventDedupTableName
          WEBHOOK_QUEUE_TABLE_NAME: !Ref WebhookQueueTableName
          SERVICE_ACCOUNT_USER_ID: !Ref ServiceAccountUserId
      Events:
        BoxWebhookEvent:
          Type: Api
          Properties:
            Path: /webhook_event
            Method: post


  SyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      MemorySize: 1024
      # 15 minutes (Lambda's maximum)
      Timeout: 900
      ReservedConcurrentExecutions: 1
      Handler: sync.lambda_handler
      Role: !Ref LambdaRoleARN
      Environment:
        Variables:
          MANIFEST_TABLE_NAME: !Ref ManifestTable
          VALIDATION_QUEUE_TABLE_NAME: !Ref ValidationQueueTableName
          SYNC_STATE_TABLE_NAME: !Ref SyncStateTableName
          FOLDER_CACHE_TABLE_NAME: !Ref FolderCacheTableName
      Events:
        DrainQueueEvent:
          Type: Schedule
          Properties:
            Schedule: rate(1 hour)
            Input: '{"mode": "drain-queue"}'
        ReconciliationEvent:
          Type: Schedule
          Properties:
            Schedule: cron(0 6 * * ? *)
            Input: '{"mode": "reconciliation"}'
        FullSyncEvent:
          Type: Schedule
          Properties:
            Schedule: cron(0 3 ? * SUN *)
            Input: '{"mode": "full-sync"}'

  # WebhookWorkerFunction's DDB Streams event source mapping is pre-provisioned
  # via CLI/SSO, same as the DynamoDB tables above.
  WebhookWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      MemorySize: 1024
      # 15 minutes (Lambda's maximum — full budget for folder fan-out)
      Timeout: 900
      Handler: webhook_worker.lambda_handler
      Role: !Ref LambdaRoleARN
      Environment:
        Variables:
          MANIFEST_TABLE_NAME: !Ref ManifestTable
          FOLDER_CACHE_TABLE_NAME: !Ref FolderCacheTableName
          WEBHOOK_QUEUE_TABLE_NAME: !Ref WebhookQueueTableName
          SERVICE_ACCOUNT_USER_ID: !Ref ServiceAccountUserId

  RedirectorFunction:
    Type: AWS::Serverless::Function
    Properties:
      MemorySize: 128
      # DynamoDB read + conditional queue write; 30s budget for cold starts.
      Timeout: 30
      Handler: redirector.lambda_handler
      Role: !Ref LambdaRoleARN
      Environment:
        Variables:
          MANIFEST_TABLE_NAME: !Ref ManifestTable
          VALIDATION_QUEUE_TABLE_NAME: !Ref ValidationQueueTableName
          ENABLE_ASYNC_VALIDATION: "true"
      Events:
        RedirectorEvent:
          Type: Api
          Properties:
            Path: /redirect/{filepath+}
            Method: get

Outputs:
  BoxWebhookURL:
    Description: "Box webhook URL"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/webhook_event"
  RedirectBaseURL:
    Description: "Redirector base URL"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/redirect"

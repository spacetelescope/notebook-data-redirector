[tox]
envlist = py312, black, flake8, coverage, bandit

[testenv]
extras = dev
allowlist_externals = pytest
commands =
    pytest

[testenv:black]
basepython = python3.12
extras = dev
allowlist_externals = black
commands=
    black --check notebook_data_redirector tests

[testenv:flake8]
basepython = python3.12
extras = dev
allowlist_externals = flake8
commands =
    flake8 --count notebook_data_redirector tests

[testenv:coverage]
basepython = python3.12
extras = dev
allowlist_externals = pytest
commands =
    pytest --cov=notebook_data_redirector --cov-fail-under 95

[testenv:bandit]
basepython = python3.12
extras = dev
allowlist_externals = bandit
commands =
    bandit -r notebook_data_redirector
